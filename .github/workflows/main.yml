name: Build PortBender

on: [push]

jobs:
  portbender:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2

      - name: Checkout submodules
        shell: bash
        run: |
          # If your submodules are configured to use SSH instead of HTTPS please uncomment the following line
          # git config --global url."https://github.com/".insteadOf "git@github.com:"
          auth_header="$(git config --local --get http.https://github.com/.extraheader)"
          git submodule sync --recursive
          git -c "http.extraheader=$auth_header" -c protocol.version=2 submodule update --init --force --recursive --depth=1

      - name: Setup Nuget.exe
        uses: nuget/setup-nuget@v1

      - name: Install .NET Framework reference assemblies (net40/net45)
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "ref-assemblies"
          $pkgs = Join-Path $env:RUNNER_TEMP "ref-packs"
          New-Item -ItemType Directory -Force -Path $root, $pkgs | Out-Null

          nuget install Microsoft.NETFramework.ReferenceAssemblies.net40 -Version 1.0.3 -OutputDirectory $pkgs -NonInteractive
          nuget install Microsoft.NETFramework.ReferenceAssemblies.net45 -Version 1.0.3 -OutputDirectory $pkgs -NonInteractive

          $src40 = Join-Path $pkgs "Microsoft.NETFramework.ReferenceAssemblies.net40.1.0.3\build\.NETFramework\v4.0"
          $src45 = Join-Path $pkgs "Microsoft.NETFramework.ReferenceAssemblies.net45.1.0.3\build\.NETFramework\v4.5"

          New-Item -ItemType Directory -Force -Path (Join-Path $root ".NETFramework\v4.0"), (Join-Path $root ".NETFramework\v4.5") | Out-Null
          Copy-Item "$src40\*" -Destination (Join-Path $root ".NETFramework\v4.0") -Recurse -Force
          Copy-Item "$src45\*" -Destination (Join-Path $root ".NETFramework\v4.5") -Recurse -Force

          "TargetFrameworkRootPath=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve MSBuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) { throw "vswhere not found at $vswhere" }
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\MSBuild.exe | Select-Object -First 1
          if (!$msbuild) { throw "MSBuild.exe not found" }
          "MSBUILD_EXE=$msbuild" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Locate PortBender
        shell: pwsh
        run: |
          $pbProj = Get-ChildItem -Recurse -Filter PortBender.csproj -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($pbProj) {
            "PORTBENDER_PATH=$($pbProj.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            $pbSln = Get-ChildItem -Recurse -Filter PortBender.sln -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($pbSln) {
              "PORTBENDER_PATH=$($pbSln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            } else {
              throw "PortBender project not found"
            }
          }

      - name: Nuget Restore (PortBender)
        shell: pwsh
        run: |
          nuget restore "$env:PORTBENDER_PATH"

      - name: Build PortBender
        shell: pwsh
        run: |
          & "$env:MSBUILD_EXE" "$env:PORTBENDER_PATH" /property:Configuration=Release

      - name: Collect PortBender
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter PortBender.exe -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\bin\\Release\\' } | Select-Object -First 1
          if (!$exe) { throw "PortBender.exe not found" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $exe.FullName artifacts\PortBender.exe

      - uses: actions/upload-artifact@master
        with:
          name: PortBender
          path: artifacts\PortBender.exe
